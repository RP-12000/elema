[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Google Maps JS API key is intentionally public (restricted by HTTP referrer in Google Cloud Console)
  SECRETS_SCAN_OMIT_KEYS = "VITE_GOOGLE_MAPS_API_KEY"

# Proxy /api/* to Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://elema.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
