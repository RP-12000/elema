[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://elema.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
