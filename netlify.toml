[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to your backend (set BACKEND_URL in Netlify environment variables)
[[redirects]]
  from   = "/api/*"
  to     = ":BACKEND_URL/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
