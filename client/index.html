<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Elema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* ── Brand — Indigo ── */
        --accent:        #6366f1;
        --accent-hover:  #4f46e5;
        --accent-light:  rgba(99,102,241,0.15);
        --accent-dim:    rgba(99,102,241,0.08);

        /* ── Surface ── */
        --bg:            #0a0a0f;
        --bg-2:          #13131a;
        --bg-3:          #1c1c26;
        --bg-4:          #26263a;
        --border:        rgba(255,255,255,0.07);
        --border-strong: rgba(255,255,255,0.12);

        /* ── Text ── */
        --text-primary:   #eeeef5;
        --text-secondary: #9898b0;
        --text-muted:     #55556a;

        /* ── Status ── */
        --green:       #34d399;
        --green-bg:    rgba(52,211,153,0.12);
        --red:         #f87171;
        --red-bg:      rgba(248,113,113,0.12);
        --blue:        #60a5fa;
        --yellow-bg:   rgba(251,191,36,0.12);
        --yellow-text: #fbbf24;

        /* ── Font sizes ── */
        --fs-xs:  11px; --fs-sm: 12px; --fs-md: 14px; --fs-lg: 15px;
        --fs-xl:  16px; --fs-2xl: 18px; --fs-3xl: 20px; --fs-4xl: 22px;
      }

      body[data-font-scale="small"] {
        --fs-xs: 10px; --fs-sm: 11px; --fs-md: 12px; --fs-lg: 13px;
        --fs-xl: 14px; --fs-2xl: 15px; --fs-3xl: 17px; --fs-4xl: 19px;
      }
      body[data-font-scale="large"] {
        --fs-xs: 13px; --fs-sm: 14px; --fs-md: 16px; --fs-lg: 17px;
        --fs-xl: 18px; --fs-2xl: 20px; --fs-3xl: 23px; --fs-4xl: 26px;
      }
      body[data-font-scale="xl"] {
        --fs-xs: 14px; --fs-sm: 16px; --fs-md: 18px; --fs-lg: 20px;
        --fs-xl: 22px; --fs-2xl: 24px; --fs-3xl: 28px; --fs-4xl: 32px;
      }

      body {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
